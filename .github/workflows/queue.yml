name: GPT-OS Queue

permissions:
  contents: write

on:
  push:
    paths:
      - 'memory/queue/**'

jobs:
  worker:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3
      - name: Process queue
        run: |
          mkdir -p memory/results
          echo '{"queue_processed": true}' > memory/results/queue_result.json
      - name: Commit result
        run: |
          git config user.name "gpt-os"
          git config user.email "gpt-os@example.com"
          git add memory/results/queue_result.json
          git commit -m "queue result [skip ci]" || echo "no changes"
          git pull --rebase
          git push
