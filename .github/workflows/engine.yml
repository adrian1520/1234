name: GPT-OS Engine

on:
  push:
    paths:
      - 'events/**'
  repository_dispatch:
    types: [run_analysis]

jobs:
  process:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@3
      - name: Run analysis
        run: |
          mkdir -p memory/results
          echo '{"result":"analysis"}' > memory/results/result.json
      - name: Commit result
        run: |
          git config user.name "gpt-os"
          git config user.email "gpt-os@example.com"
          git add memory/results/result.json
          git commit -m "analysis result [skip ci]" || echo "no changes"
          git push
